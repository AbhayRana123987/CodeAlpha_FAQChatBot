<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1f1c2c, #928dab);
    padding: 20px;
}

/* FIXED CONTAINER */
.chat-container {
    width: 100%;
    max-width: 420px;
    height: 90vh; /* responsive height */
    max-height: 650px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.chat-header {
    padding: 15px;
    text-align: center;
    font-weight: 600;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

/* Chat area */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* Messages */
.message {
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 15px;
    max-width: 75%;
    animation: fadeIn 0.3s ease-in-out;
}

.user {
    margin-left: auto;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.bot {
    background: rgba(255,255,255,0.2);
    color: white;
}

.typing {
    font-style: italic;
    opacity: 0.7;
}

/* Input */
.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.1);
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    margin-left: 10px;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    cursor: pointer;
}

/* Scrollbar */
.chat-box::-webkit-scrollbar {
    width: 6px;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #aaa;
    border-radius: 10px;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
}

/* MOBILE FIX */
@media (max-width: 500px) {
    .chat-container {
        height: 95vh;
        border-radius: 15px;
    }
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">🤖 Smart AI Chatbot</div>
    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// SAME JS (no change needed)
const faqs = [
    { q: "What is AI?", a: "Artificial Intelligence is the simulation of human intelligence by machines." },
    { q: "What is machine learning?", a: "Machine learning is a subset of AI that enables systems to learn from data." },
    { q: "What is this internship?", a: "This internship provides real-world AI experience with hands-on projects." },
    { q: "What technologies are used?", a: "We use HTML, CSS, JavaScript and NLP techniques." },
    { q: "How does this chatbot work?", a: "It matches your question with FAQs using cosine similarity." }
];

function preprocess(text) {
    return text.toLowerCase().replace(/[^\w\s]/g, "").split(" ");
}

function getVocabulary() {
    let vocab = new Set();
    faqs.forEach(f => preprocess(f.q).forEach(w => vocab.add(w)));
    return [...vocab];
}

const vocabulary = getVocabulary();

function vectorize(text) {
    const words = preprocess(text);
    return vocabulary.map(word => words.filter(w => w === word).length);
}

function cosineSimilarity(a, b) {
    let dot = 0, magA = 0, magB = 0;
    for (let i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        magA += a[i] ** 2;
        magB += b[i] ** 2;
    }
    return dot / (Math.sqrt(magA) * Math.sqrt(magB) || 1);
}

function getAnswer(input) {
    const userVec = vectorize(input);
    let bestScore = 0;
    let bestAnswer = "I’m not sure about that. Try asking something else.";

    faqs.forEach(f => {
        const score = cosineSimilarity(userVec, vectorize(f.q));
        if (score > bestScore) {
            bestScore = score;
            bestAnswer = f.a;
        }
    });

    return bestAnswer;
}

function addMessage(text, className) {
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.innerText = text;
    document.getElementById("chatBox").appendChild(msg);
    document.getElementById("chatBox").scrollTop = 9999;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.innerText = "Typing...";
    document.getElementById("chatBox").appendChild(typing);

    setTimeout(() => {
        typing.remove();
        addMessage(getAnswer(text), "bot");
    }, 600);
}

document.getElementById("userInput").addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
